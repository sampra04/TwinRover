ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true

    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    publish_tf: true        # EKF owns odom -> base_link now

    # Wheel encoder odometry — trust velocity
    odom0: /diff_drive_controller/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false

    
    # kiss-icp odometry — trust pose
    # odom1: /kiss/odometry
    # odom1_config: [true,  true,  false,
    #                false, false, true,
    #                false, false, false,
    #                false, false, false,
    #               false, false, false]
    # odom1_differential: false
    